title: GSS Financial Officer Guide
description: >-
  A practical reference for the Financial Officer of the Graduate Student
  Society of UBC Vancouver.
theme: just-the-docs
url: "https://ubcgss.github.io"
baseurl: "/financial_officer_guide"

aux_links:
  "GSS Website":
    - "https://gss.ubc.ca"

search_enabled: true
search:
  heading_level: 2
  previews: 3

heading_anchors: true

mermaid:
  version: "10"

callouts_level: quiet
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow

nav_sort: case_insensitive

exclude:
  - Gemfile
  - Gemfile.lock
  - "*.gemspec"
  - README.md
  - node_modules/
  - vendor/
